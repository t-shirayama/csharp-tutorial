services:
  docs:
    build: .
    ports:
      - "8000:8000"
    volumes:
      - .:/work
    command: mkdocs serve --dev-addr 0.0.0.0:8000

  lock:
    image: python:3.14-slim@sha256:c845af9399020c7e562969a13689e929074a10fd057acd1b1fad06a2fb068e97
    working_dir: /work
    volumes:
      - .:/work
    command: >
      sh -c "python -m pip install --no-cache-dir pip-tools
      && pip-compile requirements.txt --output-file requirements.lock --resolver=backtracking"
